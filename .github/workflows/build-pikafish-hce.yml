name: Build Pikafish-HCE Static

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make git

      - name: Clone Pikafish-HCE
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/skystarspython/Pikafish-HCE.git

      - name: Fix compilation (g++ type ambiguity)
        run: |
          cd /tmp/Pikafish-HCE/src
          # types.h: 给 operator bool() 和 operator unsigned() 加 explicit
          # 消除 Bitboard → uint64_t 转换歧义
          sed -i 's/constexpr operator bool() const/constexpr explicit operator bool() const/' types.h
          sed -i 's/constexpr operator unsigned() const/constexpr explicit operator unsigned() const/' types.h
          # 验证修改
          grep -n 'explicit operator' types.h

      - name: Build fully static binary
        run: |
          cd /tmp/Pikafish-HCE/src
          make -j$(nproc) build ARCH=x86-64-modern \
            CXX=g++ \
            CXXFLAGS="-O2 -DNDEBUG -fpermissive" \
            LDFLAGS="-static -static-libstdc++ -static-libgcc"
          file pikafish
          ldd pikafish || echo "static binary - no dynamic deps"
          mkdir -p /tmp/output
          cp pikafish /tmp/output/pikafish-hce

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-hce-static
          path: /tmp/output/pikafish-hce
          retention-days: 7
