name: Build Pikafish Static

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make git musl-tools

      - name: Clone Pikafish
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/official-pikafish/Pikafish.git

      - name: Build fully static binary
        run: |
          cd /tmp/Pikafish/src
          make -j$(nproc) build ARCH=x86-64 \
            CXX=g++ \
            CXXFLAGS="-O2 -DNDEBUG" \
            LDFLAGS="-static -static-libstdc++ -static-libgcc"
          file pikafish
          ldd pikafish || echo "static binary - no dynamic deps"
          mkdir -p /tmp/output
          cp pikafish /tmp/output/pikafish-static-full

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-static-full
          path: /tmp/output/pikafish-static-full
          retention-days: 7
